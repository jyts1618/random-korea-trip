<style>
:root{--ocean:#33bfd0;
--ink:#19404a;
--shadow:0 18px 50px rgba(0,0,0,.22);
--app-height:100vh}
*{box-sizing:border-box}
html,body{margin:0;
width:100%;
height:100%;
min-height:-webkit-fill-available;
overflow:hidden;
background:#33bfd0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:var(--ink);
-webkit-text-size-adjust:100%}
body{background:radial-gradient(circle at 18% 22%,rgba(255,255,255,.18) 0 2px,transparent 3px),radial-gradient(circle at 84% 16%,rgba(255,255,255,.18) 0 2px,transparent 3px),linear-gradient(180deg,#41c8d5 0%,#27aec3 56%,#0c7c96 100%)}
.app{height:100vh;
height:var(--app-height);
display:grid;
grid-template-rows:auto 1fr;
position:relative;
overflow:hidden}
.topbar{z-index:6;
display:flex;
align-items:center;
justify-content:space-between;
gap:14px;
padding:14px clamp(14px,3vw,28px);
background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.72));
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
box-shadow:0 8px 28px rgba(0,0,0,.12)}
.brand{display:flex;
align-items:center;
gap:12px;
min-width:0}
.brandIcon{font-size:30px}
.title{font-size:clamp(20px,3.2vw,36px);
font-weight:950;
letter-spacing:-.06em;
color:#fff;
text-shadow:0 4px 0 rgba(25,64,74,.22),0 2px 14px rgba(0,0,0,.12);
-webkit-text-stroke:1px rgba(25,64,74,.12)}
.sub{font-size:13px;
color:#34616a;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:52vw}
.actions{display:flex;
gap:8px;
align-items:center;
flex-wrap:wrap;
justify-content:flex-end}
button{appearance:none;
border:0;
border-radius:999px;
padding:11px 16px;
background:#fff;
color:#19404a;
cursor:pointer;
font-weight:900;
font-size:14px;
box-shadow:0 8px 0 rgba(25,64,74,.13),0 12px 24px rgba(0,0,0,.13);
transition:transform .12s ease,box-shadow .12s ease,opacity .12s ease}
button:hover{transform:translateY(-1px)}
button:active{transform:translateY(2px);
box-shadow:0 3px 0 rgba(25,64,74,.13),0 8px 18px rgba(0,0,0,.12)}
button:disabled{opacity:.45;
cursor:not-allowed;
transform:none}
#startBtn{background:#ffe06a}
#stopBtn{background:#ff8a5b;
color:#fff}
.mapShell{height:100%;
position:relative;
display:grid;
place-items:center;
padding:clamp(12px,3vw,34px);
overflow:hidden}
.decor{position:absolute;
pointer-events:none;
z-index:1}
.sun{right:7%;
top:18%;
font-size:46px}
.wave1{left:6%;
top:24%;
font-size:36px;
color:white;
opacity:.82}
.wave2{right:13%;
bottom:10%;
font-size:34px;
color:white;
opacity:.75}
.cloud{left:17%;
bottom:16%;
font-size:42px;
opacity:.78}
.orange{right:20%;
top:41%;
font-size:42px}
.flower{left:12%;
bottom:31%;
font-size:38px}
.wind{left:7%;
bottom:12%;
font-size:44px}
#mapWrap{position:relative;
z-index:2;
width:min(92vw,980px);
height:calc(var(--app-height) - 112px);
max-height:860px;
display:flex;
align-items:center;
justify-content:center;
filter:drop-shadow(0 28px 24px rgba(0,0,0,.20))}
#mapCanvas{display:block;
max-width:100%;
max-height:100%;
width:auto;
height:auto;
border-radius:28px;
background:transparent}
#pin{position:absolute;
font-size:clamp(34px,5vw,52px);
transform:translate(-50%,-100%);
z-index:5;
pointer-events:none;
filter:drop-shadow(0 9px 8px rgba(0,0,0,.35));
transition:none}
.actions button,
#credit{-webkit-tap-highlight-color:transparent;
touch-action:manipulation}
.pinPulse{animation:pulse .8s ease-in-out infinite alternate}
@keyframes pulse{from{scale:.94}
to{scale:1.06}
}
#liveName{position:absolute;
left:50%;
top:clamp(12px,3vw,22px);
transform:translateX(-50%);
z-index:6;
background:rgba(255,255,255,.92);
color:#19404a;
border:3px solid rgba(25,64,74,.12);
border-radius:999px;
padding:10px 20px;
font-weight:950;
font-size:clamp(15px,3.2vw,22px);
box-shadow:0 12px 28px rgba(0,0,0,.18);
display:none;
pointer-events:none;
white-space:nowrap}
#zoomView{position:fixed;
right:clamp(12px,3vw,24px);
bottom:clamp(12px,3vw,24px);
width:min(380px,calc(100vw - 24px));
height:430px;
background:white;
display:none;
z-index:10;
border:6px solid #fff;
border-radius:26px;
box-shadow:var(--shadow);
overflow:hidden}
.zoomTitle{height:46px;
display:flex;
align-items:center;
justify-content:center;
background:#fff8df;
color:#19404a;
font-weight:950;
letter-spacing:-.04em;
border-bottom:2px dashed rgba(25,64,74,.18)}
#zoomCanvas{width:100%;
height:334px;
display:block;
background:var(--ocean)}
#zoomPin{position:absolute;
left:50%;
top:calc(46px + 167px);
transform:translate(-50%,-100%);
font-size:34px;
z-index:2;
filter:drop-shadow(0 8px 8px rgba(0,0,0,.45))}
#selectedName{height:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:950;
letter-spacing:-.04em;
background:#19404a;
color:#fff;
padding:0 12px;
text-align:center}
.toast{position:absolute;
left:50%;
bottom:20px;
transform:translateX(-50%);
z-index:7;
background:rgba(25,64,74,.82);
color:white;
padding:10px 16px;
border-radius:999px;
font-size:13px;
font-weight:800;
display:none;
box-shadow:0 12px 26px rgba(0,0,0,.22)}
@supports (height:100dvh){:root{--app-height:100dvh}}
@media(max-width:760px){html,body{overflow:auto}
.app{height:100vh;
height:var(--app-height)}
.topbar{align-items:stretch;
flex-direction:column;
padding:12px}
.brand{justify-content:center;
text-align:center}
.sub{max-width:100%;
font-size:12px;
white-space:normal}
.actions{display:grid;
grid-template-columns:1fr 1fr;
width:100%}
button{justify-content:center;
padding:11px 10px;
font-size:13px}
#mapWrap{width:100%;
height:calc(var(--app-height) - 150px);
max-height:none}
.mapShell{padding:8px}
.decor{display:none}
#zoomView{left:12px;
right:12px;
width:auto;
height:330px}
#zoomCanvas{height:230px}
.zoomTitle{height:42px}
#zoomPin{top:calc(42px + 115px)}
#selectedName{height:52px;
font-size:20px}
#liveName{max-width:88vw;
overflow:hidden;
text-overflow:ellipsis}
}
#credit{position:fixed;
left:12px;
bottom:10px;
font-size:12px;
font-weight:700;
color:rgba(255,255,255,.92);
z-index:20;
letter-spacing:-.02em;
text-shadow:0 2px 6px rgba(0,0,0,.35);
text-decoration:none}
#credit:hover{text-decoration:underline}
@media(max-width:760px){#credit{font-size:11px;
left:10px;
bottom:8px}
}
</style>
</head>

if(g.type==="Polygon")return cleanPolygonList([g.coordinates]);
if(g.type==="MultiPolygon")return cleanPolygonList(g.coordinates);
return[]}

function normalizeGeoJSON(d){if(!d)throw new Error("파일 내용이 비어 있습니다.");
if(d.type==="FeatureCollection")return d;
if(d.type==="Feature")return{type:"FeatureCollection",features:[d]}
;
if(d.type==="Polygon"||d.type==="MultiPolygon")return{type:"FeatureCollection",features:[{type:"Feature",properties:{name:"선택 지역"}
,geometry:d}
]}
;
throw new Error("지원하지 않는 GeoJSON type입니다: "+(d.type||"unknown"))}

function computeBBox(data){
let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity,n=0;
for(
const f of data.features||[])for(
const poly of getCoordinatesFromGeometry(f.geometry))for(
const ring of poly)for(
const c of ring){
const x=+c[0],y=+c[1];
if(!Number.isFinite(x)||!Number.isFinite(y))continue;
n++;
if(x<minX)minX=x;
if(y<minY)minY=y;
if(x>maxX)maxX=x;
if(y>maxY)maxY=y}
if(n===0)throw new Error("GeoJSON 안에 실제 좌표가 없습니다.");
return{minX,minY,maxX,maxY,coordCount:n}
}

function projectedPoint(lon,lat){
const xGeo=(lon-bbox.minX)*projection.cosLat;
return[PADDING+xGeo*projection.scale,PADDING+(bbox.maxY-lat)*projection.scale]}

function setupCanvas(){bbox=computeBBox(geojson);

const midLat=(bbox.minY+bbox.maxY)/2,cosLat=Math.cos(midLat*Math.PI/180),geoW=(bbox.maxX-bbox.minX)*cosLat,geoH=bbox.maxY-bbox.minY,scale=(TARGET_WIDTH-PADDING*2)/geoW;
canvas.width=TARGET_WIDTH;
canvas.height=Math.round(geoH*scale+PADDING*2);
projection={scale,cosLat}
;
projectedFeatures=geojson.features.map(f=>{
const polygons=getCoordinatesFromGeometry(f.geometry).map(poly=>poly.map(ring=>ring.map(([lon,lat])=>projectedPoint(lon,lat))));

const bounds=getPolygonBounds(polygons);
return{feature:f,name:getFeatureName(f),polygons,bounds}
}
).filter(i=>i.polygons.length>0);
buildSpatialGrid()}

function getPolygonBounds(polygons){
let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
for(
const poly of polygons)for(
const ring of poly)for(const[x,y]of ring){if(x<minX)minX=x;
if(y<minY)minY=y;
if(x>maxX)maxX=x;
if(y>maxY)maxY=y}
return{minX,minY,maxX,maxY}
}

function buildSpatialGrid(){spatialGrid=Array.from({length:GRID_SIZE*GRID_SIZE}
,()=>[]);
for(
const item of projectedFeatures){
const minCol=Math.max(0,Math.floor(item.bounds.minX/canvas.width*GRID_SIZE)),maxCol=Math.min(GRID_SIZE-1,Math.floor(item.bounds.maxX/canvas.width*GRID_SIZE)),minRow=Math.max(0,Math.floor(item.bounds.minY/canvas.height*GRID_SIZE)),maxRow=Math.min(GRID_SIZE-1,Math.floor(item.bounds.maxY/canvas.height*GRID_SIZE));
for(
let r=minRow;
r<=maxRow;
r++)for(
let c=minCol;
c<=maxCol;
c++)spatialGrid[r*GRID_SIZE+c].push(item)}
}

function candidatesAtPoint(p){if(!spatialGrid)return projectedFeatures;

const c=Math.max(0,Math.min(GRID_SIZE-1,Math.floor(p.x/canvas.width*GRID_SIZE))),r=Math.max(0,Math.min(GRID_SIZE-1,Math.floor(p.y/canvas.height*GRID_SIZE)));
return spatialGrid[r*GRID_SIZE+c]||[]}

function drawPath(context,polygons){context.beginPath();
for(
const poly of polygons)for(
const ring of poly){ring.forEach(([x,y],i)=>i===0?context.moveTo(x,y):context.lineTo(x,y));
context.closePath()}
}

function drawMap(highlight=null){ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,255,255,0)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.save();
ctx.shadowColor="rgba(25,64,74,.18)";
ctx.shadowBlur=22;
ctx.shadowOffsetY=18;
for(
const item of projectedFeatures){drawPath(ctx,item.polygons);
ctx.fillStyle=item===highlight?"#ffdc5e":colorForFeature(item);
ctx.fill("evenodd")}
ctx.restore();
for(
const item of projectedFeatures){drawPath(ctx,item.polygons);
ctx.strokeStyle=item===highlight?"#704b00":"rgba(25,64,74,.40)";
ctx.lineWidth=item===highlight?4.5:1.2;
ctx.stroke()}
}

function pointInPolygon(p,ring){
const x=p.x,y=p.y;

let inside=false;
for(
let i=0,j=ring.length-1;
i<ring.length;
j=i++){
const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];

const inter=((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/((yj-yi)||1e-12)+xi);
if(inter)inside=!inside}
return inside}

function pointInProjectedFeature(p,item){for(
const poly of item.polygons){
let outer=false,hole=false;
poly.forEach((ring,i)=>{if(i===0&&pointInPolygon(p,ring))outer=true;
if(i>0&&pointInPolygon(p,ring))hole=true}
);
if(outer&&!hole)return true}
return false}

function pointInBounds(p,b){return p.x>=b.minX&&p.x<=b.maxX&&p.y>=b.minY&&p.y<=b.maxY}

function featureAtPoint(p){if(lastFeature&&pointInBounds(p,lastFeature.bounds)&&pointInProjectedFeature(p,lastFeature))return lastFeature;
for(
const item of candidatesAtPoint(p)){if(pointInBounds(p,item.bounds)&&pointInProjectedFeature(p,item)){lastFeature=item;
return item}
}
return null}

function isLandPoint(p){return!!featureAtPoint(p)}

function rebuildValidSpawnPoints(){validSpawnPoints=[];

const step=22;
for(
let y=PADDING*.5;
y<canvas.height-PADDING*.5;
y+=step)for(
let x=PADDING*.5;
x<canvas.width-PADDING*.5;
x+=step){
const p={x,y}
;
if(isLandPoint(p))validSpawnPoints.push(p)}
}

function randomLandPoint(){if(validSpawnPoints.length===0)rebuildValidSpawnPoints();

const b=validSpawnPoints[Math.floor(Math.random()*validSpawnPoints.length)];
return{x:b.x,y:b.y}
}

function randomFarLandPoint(from){if(validSpawnPoints.length===0)rebuildValidSpawnPoints();

const minDist=Math.min(canvas.width,canvas.height)*.18;
for(
let i=0;
i<80;
i++){
const p=randomLandPoint();
if(!from||Math.hypot(p.x-from.x,p.y-from.y)>minDist)return p}
return randomLandPoint()}

function hopToAnotherLandMass(){
const p=randomFarLandPoint(pos);
setPhysicsPosition(p);
resetVelocity();

const cur=featureAtPoint(pos);
if(cur){liveNameEl.textContent=cur.name;
liveNameEl.style.display="block"}
}

function getCanvasBox(){
const w=mapWrap.getBoundingClientRect(),c=canvas.getBoundingClientRect();
return{left:c.left-w.left,top:c.top-w.top,scaleX:c.width/canvas.width,scaleY:c.height/canvas.height}
}

function setPhysicsPosition(p){
const b=getCanvasBox();
pos={x:p.x,y:p.y}
;
pin.style.left=b.left+p.x*b.scaleX+"px";
pin.style.top=b.top+p.y*b.scaleY+"px"}

function resetVelocity(){
const a=Math.random()*Math.PI*2;
velocity={x:Math.cos(a)*PHYSICS.speed,y:Math.sin(a)*PHYSICS.speed}
}

function clampSpeed(){
const s=Math.hypot(velocity.x,velocity.y);
if(s>PHYSICS.maxSpeed){velocity.x=velocity.x/s*PHYSICS.maxSpeed;
velocity.y=velocity.y/s*PHYSICS.maxSpeed}
if(s<PHYSICS.minVelocity)resetVelocity()}

function reflectFromWater(prev){
const a=Math.atan2(velocity.y,velocity.x),s=Math.min(PHYSICS.maxSpeed,Math.hypot(velocity.x,velocity.y)||PHYSICS.speed);
for(
let i=0;
i<10;
i++){
const ta=a+Math.PI+(Math.random()-.5)*Math.PI*1.4,vx=Math.cos(ta)*s*PHYSICS.bounce,vy=Math.sin(ta)*s*PHYSICS.bounce,c={x:prev.x+vx,y:prev.y+vy}
;
if(isLandPoint(c)){velocity.x=vx;
velocity.y=vy;
return c}
}
resetVelocity();
return prev}

function physicsStep(time){if(!running)return;
if(!lastTime)lastTime=time;

const dt=Math.min(24,time-lastTime)/16.67;
lastTime=time;
velocity.x+=(Math.random()-.5)*PHYSICS.accel;
velocity.y+=(Math.random()-.5)*PHYSICS.accel;

const th=(Math.random()-.5)*PHYSICS.turnNoise,co=Math.cos(th),si=Math.sin(th),rx=velocity.x*co-velocity.y*si,ry=velocity.x*si+velocity.y*co;
velocity.x=rx*PHYSICS.drag;
velocity.y=ry*PHYSICS.drag;
clampSpeed();

const prev={x:pos.x,y:pos.y}
;

let next={x:pos.x+velocity.x*dt,y:pos.y+velocity.y*dt}
;
if(!isLandPoint(next))next=reflectFromWater(prev);
setPhysicsPosition(next);
frameSkip++;
hopCooldown++;
if(hopCooldown>ISLAND_HOP_FRAMES&&Math.random()<ISLAND_HOP_CHANCE){hopCooldown=0;
hopToAnotherLandMass()}
if(frameSkip%8===0){
const cur=featureAtPoint(pos);
if(cur){liveNameEl.textContent=cur.name;
liveNameEl.style.display="block"}
}
rafId=requestAnimationFrame(physicsStep)}

function start(){if(running||projectedFeatures.length===0)return;
running=true;
lastTime=0;
frameSkip=0;
hopCooldown=0;
startBtn.disabled=true;
stopBtn.disabled=false;
zoomView.style.display="none";
liveNameEl.style.display="block";
pin.classList.add("pinPulse");
setStatus("고속 물리 이동 중 · 섬 포함 전체 행정구역 이동");
rafId=requestAnimationFrame(physicsStep)}

function openSearchForRegion(regionName){
const q=encodeURIComponent(regionName+SEARCH_SUFFIX);

const url=SEARCH_ENGINE==="google"?`https://www.google.com/search?q=${q}
`:`https://search.naver.com/search.naver?query=${q}
`;
const popup=window.open(url,"_blank","noopener,noreferrer");
if(!popup)window.location.href=url;
showToast(regionName+" 검색 열기")}

function stop(){if(!running)return;
running=false;
if(rafId)cancelAnimationFrame(rafId);
rafId=null;
startBtn.disabled=false;
stopBtn.disabled=true;
pin.classList.remove("pinPulse");

const selectedName=zoom();
if(AUTO_SEARCH_ON_STOP&&selectedName)openSearchForRegion(selectedName)}

function zoom(){if(!pos)return null;

const selected=featureAtPoint(pos);
drawMap(selected);
setPhysicsPosition(pos);

const name=selected?selected.name:"선택 지역";
selectedNameEl.textContent=name;
liveNameEl.textContent=name;
liveNameEl.style.display="block";
setStatus("선택 완료 · "+name);
zoomView.style.display="block";

const displayWidth=zoomView.clientWidth||380,canvasH=zoomView.clientHeight-96,displayHeight=Math.max(220,canvasH),dpr=Math.max(2,window.devicePixelRatio||1),outputW=Math.round(displayWidth*dpr),outputH=Math.round(displayHeight*dpr);
zoomCanvas.width=outputW;
zoomCanvas.height=outputH;
zoomCanvas.style.width=displayWidth+"px";
zoomCanvas.style.height=displayHeight+"px";
zctx.clearRect(0,0,outputW,outputH);
zctx.imageSmoothingEnabled=true;
zctx.imageSmoothingQuality="high";

const zoomFactor=4.6,sourceW=outputW/zoomFactor,sourceH=outputH/zoomFactor,sourceX=Math.max(0,Math.min(canvas.width-sourceW,pos.x-sourceW/2)),sourceY=Math.max(0,Math.min(canvas.height-sourceH,pos.y-sourceH/2));
zctx.drawImage(canvas,sourceX,sourceY,sourceW,sourceH,0,0,outputW,outputH);
return name}

function initWithGeoJSON(data){geojson=normalizeGeoJSON(data);
running=false;
if(rafId)cancelAnimationFrame(rafId);
rafId=null;
zoomView.style.display="none";
updateViewportHeight();
setupCanvas();
drawMap();
rebuildValidSpawnPoints();

const startPoint=randomLandPoint();
setPhysicsPosition(startPoint);
resetVelocity();
startBtn.disabled=false;
stopBtn.disabled=true;
setStatus("지도 준비 완료 · 행정구역 "+projectedFeatures.length+"개 · 섬 포함 포인트 "+validSpawnPoints.length+"개");
showToast("지도 준비 완료")}
function handleViewportChange(){
updateViewportHeight();
if(pos)setPhysicsPosition(pos);
if(zoomView.style.display==="block")zoom()}
window.addEventListener("resize",handleViewportChange);
window.addEventListener("orientationchange",()=>setTimeout(handleViewportChange,120));
window.addEventListener("pageshow",handleViewportChange);
if(window.visualViewport)window.visualViewport.addEventListener("resize",handleViewportChange);
startBtn.onclick=start;
stopBtn.onclick=stop;
initWithGeoJSON(EMBEDDED_GEOJSON);

</script>
